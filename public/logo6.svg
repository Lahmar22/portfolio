<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F2027" />
      <stop offset="100%" stop-color="#203A43" />
    </linearGradient>
    
    <!-- ZL Glow Gradient -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>
    
    <!-- Subtle Drop Shadow for Depth -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Base Icon Shape (Rounded Square) -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Stylized ZL Monogram -->
  <g filter="url(#dropShadow)">
    <!-- Z Letter -->
    <path d="M 135 176 H 255 L 145 336 H 265" 
          fill="none" 
          stroke="url(#logoGrad)" 
          stroke-width="38" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
    
    <!-- L Letter -->
    <path d="M 305 176 V 336 H 405" 
          fill="none" 
          stroke="url(#logoGrad)" 
          stroke-width="38" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
  </g>
</svg>
